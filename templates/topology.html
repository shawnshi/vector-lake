<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Vector Lake Topology</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: radial-gradient(circle at center, #111827 0%, #030712 100%); overflow: hidden; font-family: 'Inter', sans-serif; color: #E5E7EB; }
        #3d-graph { width: 100%; height: 100%; position: absolute; inset: 0; z-index: 1; }
        #info-panel, .hud-box, #stats-panel {
            background: rgba(15, 23, 42, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 10px 30px -5px rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(16px) saturate(180%);
            -webkit-backdrop-filter: blur(16px) saturate(180%);
        }
        #info-panel {
            position: absolute; top: 20px; left: 20px; width: 320px; max-height: 82vh; overflow-y: auto;
            border-radius: 10px; padding: 20px; z-index: 10; display: none;
        }
        #info-panel.visible { display: block; }
        #info-title { margin: 0 0 12px 0; font-size: 1.25rem; line-height: 1.2; }
        #info-title a { color: #60A5FA; text-decoration: none; }
        #info-title a:hover { text-decoration: underline; }
        #info-meta { font-size: 0.8rem; display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 16px; border-bottom: 1px solid rgba(255,255,255,0.08); padding-bottom: 12px; }
        #info-meta span { display: inline-flex; align-items: center; background: rgba(55,65,81,0.5); padding: 4px 8px; border-radius: 999px; border: 1px solid rgba(255,255,255,0.05); }
        #info-meta span strong { color: #9CA3AF; margin-right: 4px; font-weight: 500; }
        #info-summary { font-size: 0.92rem; line-height: 1.55; color: #D1D5DB; }
        .info-section { font-size: 0.85rem; word-break: break-word; background: rgba(0, 0, 0, 0.25); padding: 10px; border-radius: 6px; margin-bottom: 10px; }
        .info-section strong { color: #34D399; display: block; margin-bottom: 6px; }
        .info-section ul { margin: 0; padding-left: 20px; }
        .info-section a { color: #60A5FA; text-decoration: none; cursor: pointer; }
        .info-section a:hover { text-decoration: underline; }
        #close-btn { position: absolute; top: 10px; right: 15px; cursor: pointer; color: #9CA3AF; font-size: 1.2rem; }
        #right-hud { position: absolute; top: 20px; right: 20px; width: 252px; max-height: 92vh; overflow-y: auto; z-index: 10; display: flex; flex-direction: column; gap: 12px; padding-right: 5px; }
        .hud-box { border-radius: 10px; padding: 12px 15px; }
        .hud-box h4 { margin: 0 0 10px 0; font-size: 0.82rem; color: #9CA3AF; text-transform: uppercase; letter-spacing: 0.06em; }
        #search-input {
            width: 100%; padding: 8px 10px; box-sizing: border-box; background: rgba(0,0,0,0.4);
            border: 1px solid #4B5563; border-radius: 6px; color: #E5E7EB; font-size: 0.85rem;
        }
        #search-results { max-height: 220px; overflow-y: auto; background: rgba(15, 23, 42, 0.95); border-radius: 0 0 6px 6px; display: none; margin-top: 2px; }
        .search-item { padding: 6px 10px; font-size: 0.8rem; cursor: pointer; border-bottom: 1px solid #1F2937; }
        .search-item:hover { background: #374151; color: #60A5FA; }
        .toggle-btn {
            background: #1F2937; color: #D1D5DB; border: 1px solid #374151; padding: 7px 12px; border-radius: 6px;
            cursor: pointer; width: 100%; text-align: left; margin-bottom: 8px; font-size: 0.85rem;
        }
        .toggle-btn.active { background: #2563EB; color: #FFFFFF; border-color: #3B82F6; }
        .legend-item, .metric-item { display: flex; align-items: center; margin-bottom: 6px; font-size: 0.82rem; color: #D1D5DB; }
        .legend-color, .metric-color { width: 12px; height: 12px; border-radius: 999px; margin-right: 8px; flex-shrink: 0; }
        .filter-checkbox { display: flex; align-items: center; margin-bottom: 6px; font-size: 0.84rem; }
        .filter-checkbox input { margin-right: 8px; accent-color: #60A5FA; }
        #stats-panel {
            position: absolute; bottom: 0; left: 0; width: 100%; padding: 12px 20px; box-sizing: border-box;
            display: flex; justify-content: center; gap: 24px; z-index: 10; flex-wrap: wrap; border-top: 1px solid #374151;
        }
        .stat-item { font-size: 0.84rem; color: #D1D5DB; font-weight: 500; text-transform: uppercase; }
        #loading {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.8); padding: 20px 40px; border-radius: 8px; color: #fff; z-index: 100;
        }
    </style>
    <script src="https://unpkg.com/3d-force-graph"></script>
</head>
<body>
    <div id="loading">Computing Topology...</div>
    <div id="3d-graph"></div>

    <div id="info-panel">
        <div id="close-btn" onclick="document.getElementById('info-panel').classList.remove('visible'); selectedNode = null; if(typeof Graph !== 'undefined') Graph.nodeColor(currentColor).linkVisibility(linkVisibility).linkColor(currentLinkColor);">×</div>
        <h2 id="info-title"></h2>
        <div id="info-meta"></div>
        <div class="info-section">
            <strong>Summary</strong>
            <div id="info-summary"></div>
        </div>
        <div class="info-section">
            <strong>Links</strong>
            <ul id="info-links"></ul>
        </div>
        <div class="info-section">
            <strong>Sources</strong>
            <ul id="info-sources"></ul>
        </div>
    </div>

    <div id="right-hud">
        <div class="hud-box">
            <h4>Search</h4>
            <input type="text" id="search-input" placeholder="Search node or claim..." autocomplete="off">
            <div id="search-results"></div>
        </div>

        <div class="hud-box">
            <h4>View Mode</h4>
            <button id="btn-page-view" class="toggle-btn active">Page View</button>
            <button id="btn-claim-view" class="toggle-btn">Claim View</button>
        </div>

        <div class="hud-box">
            <h4>Color Mode</h4>
            <button id="btn-type" class="toggle-btn active">Ontology / Claim State</button>
            <button id="btn-community" class="toggle-btn">Page Community</button>
        </div>

        <div class="hud-box">
            <h4>Legend</h4>
            <div id="legend"></div>
        </div>

        <div class="hud-box">
            <h4>Filters</h4>
            <div id="type-filters"></div>
        </div>

        <div class="hud-box">
            <h4>Governance</h4>
            <div id="governance-metrics"></div>
        </div>
    </div>

    <div id="stats-panel"></div>

    <script>
        function escapeHTML(str) {
            if (!str) return '';
            return String(str)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#039;');
        }

        const rawData = %%GRAPH_DATA%%;
        const memoryBasePath = "%%MEMORY_BASE_PATH%%";

        const PAGE_COLORS = {
            "Entity": "#FF0266",
            "Concept": "#00F0FF",
            "Source": "#00FF41",
            "Synthesis": "#FFB000",
            "System": "#8B5CF6",
            "Project": "#EC4899",
            "Person": "#F43F5E",
            "Event": "#14B8A6",
            "Term": "#64748B",
            "Unknown": "#9CA3AF"
        };
        const CLAIM_STATE_COLORS = {
            "active": "#10B981",
            "review-due": "#F59E0B",
            "needs-review": "#F97316",
            "expiring-soon": "#FB7185",
            "expired": "#EF4444",
            "unsupported": "#A855F7",
            "conflicted": "#E11D48",
            "provisional": "#38BDF8",
            "unknown": "#9CA3AF"
        };
        const COMMUNITY_COLORS = ['#e6194b', '#3b82f6', '#10b981', '#f59e0b', '#8b5cf6', '#d946ef', '#06b6d4', '#f43f5e', '#14b8a6', '#84cc16'];

        const graphs = {
            page: rawData.pageGraph || { nodes: rawData.nodes || [], edges: rawData.edges || [], community_labels: rawData.community_labels || {} },
            claim: rawData.claimGraph || { nodes: [], edges: [], community_labels: {} }
        };
        let activeGraphKey = 'page';
        let colorMode = 'type';
        let hoverNode = null;
        let selectedNode = null;
        const activeGroups = new Set();

        const graphDiv = document.getElementById('3d-graph');
        const Graph = ForceGraph3D()(graphDiv);

        function currentGraph() {
            return graphs[activeGraphKey];
        }

        function currentLinkColor(link) {
            const focusNode = hoverNode || selectedNode;
            if (focusNode) {
                const s = link.source.id || link.source;
                const t = link.target.id || link.target;
                if (s === focusNode.id || t === focusNode.id) return 'rgba(255,2,102,0.85)';
                return 'rgba(0,0,0,0)';
            }
            if (activeGraphKey === 'claim' && link.relation === 'contradiction') return 'rgba(255,0,60,0.6)';
            return 'rgba(0,240,255,0.18)';
        }

        function currentColor(node) {
            if (activeGraphKey === 'page' && (node.alignment_score < 60 || node.status === 'contested' || node.status === 'misaligned')) {
                return '#FF003C';
            }
            const focusNode = hoverNode || selectedNode;
            if (focusNode && focusNode.id !== node.id && !isNeighbor(focusNode, node)) {
                return 'rgba(55,65,81,0.2)';
            }
            if (activeGraphKey === 'claim') {
                return CLAIM_STATE_COLORS[node.validity_state || 'unknown'] || CLAIM_STATE_COLORS.unknown;
            }
            if (colorMode === 'community') {
                const cid = node.community || 0;
                return COMMUNITY_COLORS[cid % COMMUNITY_COLORS.length];
            }
            return PAGE_COLORS[node.group] || PAGE_COLORS.Unknown;
        }

        function buildNeighbors(graphData) {
            const map = {};
            graphData.links.forEach(link => {
                const s = link.source.id || link.source;
                const t = link.target.id || link.target;
                if (!map[s]) map[s] = new Set();
                if (!map[t]) map[t] = new Set();
                map[s].add(t);
                map[t].add(s);
            });
            return map;
        }

        let neighbors = {};

        function isNeighbor(n1, n2) {
            const a = n1.id || n1;
            const b = n2.id || n2;
            return neighbors[a] && neighbors[a].has(b);
        }

        function syncActiveGroups() {
            activeGroups.clear();
            currentGraph().nodes.forEach(node => activeGroups.add(node.group || 'Unknown'));
        }

        function toGraphData(data) {
            return {
                nodes: data.nodes.map(node => ({ ...node })),
                links: data.edges.map(edge => ({ ...edge }))
            };
        }

        function updateFilters() {
            const container = document.getElementById('type-filters');
            container.innerHTML = '';
            Array.from(new Set(currentGraph().nodes.map(node => node.group || 'Unknown'))).sort().forEach(group => {
                const label = document.createElement('label');
                label.className = 'filter-checkbox';
                const checked = activeGroups.has(group) ? 'checked' : '';
                label.innerHTML = `<input type="checkbox" value="${group}" ${checked}> ${group}`;
                label.querySelector('input').addEventListener('change', (event) => {
                    if (event.target.checked) activeGroups.add(group);
                    else activeGroups.delete(group);
                    renderGraph();
                });
                container.appendChild(label);
            });
        }

        function renderLegend() {
            const legend = document.getElementById('legend');
            legend.innerHTML = '';
            if (activeGraphKey === 'claim') {
                Object.entries(CLAIM_STATE_COLORS).forEach(([state, color]) => {
                    legend.innerHTML += `<div class="legend-item"><div class="legend-color" style="background:${color}"></div>${state}</div>`;
                });
                return;
            }
            if (colorMode === 'community') {
                const labels = currentGraph().community_labels || {};
                Object.keys(labels).slice(0, 8).forEach(cid => {
                    const color = COMMUNITY_COLORS[cid % COMMUNITY_COLORS.length];
                    legend.innerHTML += `<div class="legend-item"><div class="legend-color" style="background:${color}"></div>${labels[cid]}</div>`;
                });
                return;
            }
            Array.from(activeGroups).sort().forEach(group => {
                const color = PAGE_COLORS[group] || PAGE_COLORS.Unknown;
                const count = currentGraph().nodes.filter(n => (n.group || 'Unknown') === group).length;
                legend.innerHTML += `<div class="legend-item"><div class="legend-color" style="background:${color}"></div>${group} (${count})</div>`;
            });
        }

        function renderGovernanceMetrics() {
            const container = document.getElementById('governance-metrics');
            const metrics = rawData.governanceMetrics || {};
            const validityCounts = metrics.validity_state_counts || {};
            container.innerHTML = '';
            Object.entries(validityCounts).forEach(([state, count]) => {
                const color = CLAIM_STATE_COLORS[state] || CLAIM_STATE_COLORS.unknown;
                container.innerHTML += `<div class="metric-item"><div class="metric-color" style="background:${color}"></div>${state}: ${count}</div>`;
            });
            if (!container.innerHTML) {
                container.innerHTML = '<div class="metric-item">No governance metrics.</div>';
            }
        }

        function renderStats() {
            const stats = document.getElementById('stats-panel');
            const graph = currentGraph();
            stats.innerHTML = '';
            stats.innerHTML += `<div class="stat-item">${activeGraphKey} nodes: ${graph.nodes.length}</div>`;
            stats.innerHTML += `<div class="stat-item">${activeGraphKey} edges: ${graph.edges.length}</div>`;
            if (activeGraphKey === 'claim') {
                const counts = rawData.governanceMetrics && rawData.governanceMetrics.validity_state_counts ? rawData.governanceMetrics.validity_state_counts : {};
                Object.entries(counts).forEach(([state, count]) => {
                    stats.innerHTML += `<div class="stat-item">${state}: ${count}</div>`;
                });
            }
        }

        function renderSearch() {
            const input = document.getElementById('search-input');
            const results = document.getElementById('search-results');
            input.oninput = (event) => {
                const val = event.target.value.toLowerCase().trim();
                results.innerHTML = '';
                if (!val) {
                    results.style.display = 'none';
                    return;
                }
                const tokens = val.split(/\s+/);
                
                const scoredMatches = currentGraph().nodes.map(node => {
                    const name = (node.name || '').toLowerCase();
                    const id = (node.id || '').toLowerCase();
                    const summary = (node.summary || '').toLowerCase();
                    
                    let score = 0;
                    let allTokensMatch = true;
                    
                    for (const token of tokens) {
                        let tokenScore = 0;
                        if (name.includes(token)) tokenScore = 10;
                        else if (id.includes(token)) tokenScore = 5;
                        else if (summary.includes(token)) tokenScore = 1;
                        
                        if (tokenScore === 0) {
                            allTokensMatch = false;
                            break;
                        }
                        score += tokenScore;
                    }
                    
                    return { node, score, allTokensMatch };
                }).filter(m => m.allTokensMatch && m.score > 0);
                
                scoredMatches.sort((a, b) => b.score - a.score);
                const matches = scoredMatches.slice(0, 10);
                
                if (!matches.length) {
                    results.style.display = 'none';
                    return;
                }
                results.style.display = 'block';
                matches.forEach(matchObj => {
                    const match = matchObj.node;
                    const row = document.createElement('div');
                    row.className = 'search-item';
                    const title = match.name || match.id;
                    const type = match.group ? `[${match.group}] ` : '';
                    const degreeInfo = match.degree ? ` (关联: ${match.degree})` : '';
                    row.textContent = `${type}${title}${degreeInfo}`;
                    row.onclick = () => {
                        results.style.display = 'none';
                        selectNode(match.id);
                    };
                    results.appendChild(row);
                });
            };
        }

        function nodeVisibility(node) {
            return activeGroups.has(node.group || 'Unknown');
        }

        function resolveNode(idOrNode) {
            if (typeof idOrNode === 'object') return idOrNode;
            return currentGraph().nodes.find(node => node.id === idOrNode) || { group: 'Unknown' };
        }

        function linkVisibility(link) {
            const s = resolveNode(link.source).group || 'Unknown';
            const t = resolveNode(link.target).group || 'Unknown';
            if (!activeGroups.has(s) || !activeGroups.has(t)) return false;
            const focusNode = hoverNode || selectedNode;
            if (!focusNode) return true;
            const src = link.source.id || link.source;
            const tgt = link.target.id || link.target;
            return src === focusNode.id || tgt === focusNode.id;
        }

        function renderGraph() {
            const data = toGraphData(currentGraph());
            neighbors = buildNeighbors(data);
            Graph.graphData(data)
                .nodeId('id')
                .nodeLabel(node => `[${node.group}] ${node.name || node.id} (关联: ${node.degree || 0})`)
                .nodeVal(node => Math.max(2.5, Math.sqrt(node.degree || 1) * 3.8))
                .nodeRelSize(7)
                .nodeColor(currentColor)
                .nodeVisibility(nodeVisibility)
                .nodeOpacity(node => {
                    const focusNode = hoverNode || selectedNode;
                    if (focusNode && focusNode.id !== node.id && !isNeighbor(focusNode, node)) return 0.25;
                    let decay = node.decay_weight;
                    if (decay === undefined) decay = 1.0;
                    return Math.max(0.65, decay);
                })
                .linkWidth(link => Math.max(0.8, (link.weight || 1) * 0.7))
                .linkColor(currentLinkColor)
                .linkVisibility(linkVisibility)
                .linkDirectionalParticles(link => {
                    const focusNode = hoverNode || selectedNode;
                    if (!focusNode) return 0.5;
                    const src = link.source.id || link.source;
                    const tgt = link.target.id || link.target;
                    return (src === focusNode.id || tgt === focusNode.id) ? 3 : 0;
                })
                .linkDirectionalParticleSpeed(0.008)
                .linkDirectionalParticleWidth(2.5)
                .onNodeHover(node => {
                    document.body.style.cursor = node ? 'pointer' : null;
                    hoverNode = node;
                    Graph.nodeColor(currentColor).linkVisibility(linkVisibility).linkColor(currentLinkColor).nodeOpacity(Graph.nodeOpacity());
                })
                .onNodeClick(node => selectNode(node.id))
                 .onBackgroundClick(() => {
                     selectedNode = null;
                     document.getElementById('info-panel').classList.remove('visible');
                     Graph.nodeColor(currentColor).linkVisibility(linkVisibility).linkColor(currentLinkColor);
                 });

            // Adjust Forces for 1500+ nodes
            Graph.d3Force('charge').strength(-200);
            Graph.d3Force('link').distance(120);

            updateFilters();
            renderLegend();
            renderStats();
        }

        function nodeHref(node) {
            if (activeGraphKey === 'claim') return null;
            return `${memoryBasePath}wiki/${node.id}.md`;
        }

        function selectNode(nodeId) {
            const node = currentGraph().nodes.find(item => item.id === nodeId);
            if (!node) return;
            const liveNode = Graph.graphData().nodes.find(item => item.id === nodeId) || node;
            const distance = 150;
            const norm = Math.hypot(liveNode.x || 1, liveNode.y || 1, liveNode.z || 1);
            const ratio = 1 + distance / norm;
            Graph.cameraPosition({ x: (liveNode.x || 1) * ratio, y: (liveNode.y || 1) * ratio, z: (liveNode.z || 1) * ratio }, liveNode, 1200);

            const href = nodeHref(node);
            const titleSafe = escapeHTML(node.name || node.id);
            document.getElementById('info-title').innerHTML = href ? `<a href="${escapeHTML(href)}" target="_blank">${titleSafe}</a>` : titleSafe;
            selectedNode = node;
            Graph.nodeColor(currentColor).linkVisibility(linkVisibility).linkColor(currentLinkColor);

            const meta = [];
            meta.push(`<span><strong>Mode</strong> ${activeGraphKey}</span>`);
            meta.push(`<span><strong>Type</strong> ${node.group || 'Unknown'}</span>`);
            meta.push(`<span><strong>Degree</strong> ${node.degree || 0}</span>`);
            if (node.validity_state) meta.push(`<span><strong>Validity</strong> ${node.validity_state}</span>`);
            if (node.claim_type) meta.push(`<span><strong>Claim</strong> ${node.claim_type}</span>`);
            if (node.confidence !== undefined && node.confidence !== null) meta.push(`<span><strong>Conf</strong> ${node.confidence}</span>`);
            if (node.domain) meta.push(`<span><strong>Domain</strong> ${node.domain}</span>`);
            if (node.updated) meta.push(`<span><strong>Updated</strong> ${node.updated.substring(0, 10)}</span>`);
            if (node.alignment_score !== undefined) meta.push(`<span><strong>Align</strong> ${node.alignment_score}</span>`);
            if (node.decay_weight !== undefined) meta.push(`<span><strong>Decay</strong> ${node.decay_weight}</span>`);
            document.getElementById('info-meta').innerHTML = meta.join('');
            document.getElementById('info-summary').innerText = node.summary || 'No summary available.';

            const links = document.getElementById('info-links');
            const sources = document.getElementById('info-sources');
            links.innerHTML = '';
            sources.innerHTML = '';

            (node.semantic_links || []).forEach(targetId => {
                const targetNode = currentGraph().nodes.find(item => item.id === targetId);
                const name = targetNode ? (targetNode.name || targetId) : targetId;
                const group = targetNode ? (targetNode.group || 'Unknown') : 'Unknown';
                const li = document.createElement('li');
                const a = document.createElement('a');
                a.style.cursor = 'pointer';
                a.setAttribute('data-id', targetId);
                a.onclick = function() { selectNode(this.getAttribute('data-id')); };
                a.textContent = `[${group}] ${name}`;
                li.appendChild(a);
                links.appendChild(li);
            });
            if (links.children.length === 0) links.innerHTML = '<li>None</li>';

            (node.sources || []).forEach(source => {
                const hrefValue = activeGraphKey === 'claim' ? `${memoryBasePath}wiki/${source}` : `${memoryBasePath}${source}`;
                const li = document.createElement('li');
                const a = document.createElement('a');
                a.href = hrefValue;
                a.target = '_blank';
                a.textContent = source;
                li.appendChild(a);
                sources.appendChild(li);
            });
            if (sources.children.length === 0) sources.innerHTML = '<li>None</li>';

            document.getElementById('info-panel').classList.add('visible');
        }

        document.getElementById('btn-page-view').onclick = () => {
            activeGraphKey = 'page';
            colorMode = 'type';
            syncActiveGroups();
            document.getElementById('btn-page-view').classList.add('active');
            document.getElementById('btn-claim-view').classList.remove('active');
            document.getElementById('btn-community').disabled = false;
            renderGraph();
        };
        document.getElementById('btn-claim-view').onclick = () => {
            activeGraphKey = 'claim';
            colorMode = 'type';
            syncActiveGroups();
            document.getElementById('btn-claim-view').classList.add('active');
            document.getElementById('btn-page-view').classList.remove('active');
            document.getElementById('btn-community').disabled = true;
            document.getElementById('btn-community').classList.remove('active');
            document.getElementById('btn-type').classList.add('active');
            renderGraph();
        };
        document.getElementById('btn-type').onclick = () => {
            colorMode = 'type';
            document.getElementById('btn-type').classList.add('active');
            document.getElementById('btn-community').classList.remove('active');
            renderGraph();
        };
        document.getElementById('btn-community').onclick = () => {
            if (activeGraphKey === 'claim') return;
            colorMode = 'community';
            document.getElementById('btn-community').classList.add('active');
            document.getElementById('btn-type').classList.remove('active');
            renderGraph();
        };

        syncActiveGroups();
        renderGovernanceMetrics();
        renderSearch();
        renderGraph();
        setTimeout(() => { document.getElementById('loading').style.display = 'none'; }, 800);
    </script>
</body>
</html>
